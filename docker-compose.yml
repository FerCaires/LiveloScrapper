networks:
  livelo-network:
    driver: bridge

services:
  scraper:
    build: .
    container_name: livelo-scrapper
    environment:
      - TZ=America/Sao_Paulo
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
    networks:
      - livelo-network
    restart: unless-stopped
